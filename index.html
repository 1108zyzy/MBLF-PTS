<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 掌心魔法</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
            background-image: radial-gradient(circle at center, #220011 0%, #000000 100%);
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .input_video { display: none; }

        /* 3D 舞台容器 */
        .scene {
            width: 300px;
            height: 400px;
            perspective: 1000px; /* 开启3D透视 */
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 旋转的包装器 */
        .card-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d; /* 保持子元素3D效果 */
            /* 默认动画：悬浮 + 旋转 */
            animation: floatSpin 6s linear infinite;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 核心卡片元素 */
        .photo-card {
            width: 300px;
            height: 300px; /* 正方形方便做爱心 */
            position: absolute;
            top: 50%;
            left: 50%;
            margin-top: -150px;
            margin-left: -150px;

            /* 替换你的照片 */
            background-image: url('https://images.unsplash.com/photo-1516617442634-75371039cb3a?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;

            /* 默认形态：爱心 */
            clip-path: path("M150 285 C 150 285 25 190 25 95 A 68 68 0 0 1 150 95 A 68 68 0 0 1 275 95 C 275 190 150 285 150 285 Z");

            /* 高级质感：渐变遮罩 + 发光边框模拟 */
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5), 0 0 30px rgba(255, 20, 100, 0.8);

            /* 叠加一层红色滤镜，让它看起来像红心，展开时恢复原色 */
            filter: grayscale(0.2) sepia(0.5) hue-rotate(320deg) saturate(3);

            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);

            /* 让背面不可见，制造3D旋转的真实感 */
            backface-visibility: visible;
        }

        /* 装饰光环（增加高级感） */
        .card-wrapper::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 320px; height: 320px;
            transform: translate(-50%, -50%) translateZ(-20px); /* 放在爱心后面 */
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,0,80,0.4) 0%, transparent 70%);
            animation: pulse 2s ease-in-out infinite;
            opacity: 1;
            transition: opacity 0.5s;
        }

        /* ---------------- 🌟 绽放状态 🌟 ---------------- */

        /* 1. 停止旋转，正对屏幕 */
        .card-wrapper.bloom {
            animation: none; /* 移除旋转动画 */
            transform: rotateY(0deg) rotateX(0deg) scale(1); /* 强制归位 */
        }

        /* 2. 隐藏背景光环 */
        .card-wrapper.bloom::before {
            opacity: 0;
        }

        /* 3. 爱心变矩形照片 */
        .card-wrapper.bloom .photo-card {
            /* 变成圆角矩形 */
            clip-path: inset(0% 0% 0% 0% round 10px);
            width: 320px; /* 稍微变大 */
            height: 420px; /* 变成竖构图照片 */
            margin-top: -210px;
            margin-left: -160px;

            /* 移除滤镜，显示原图色彩 */
            filter: none;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 2px solid rgba(255,255,255,0.2);
        }

        /* ---------------- 动画定义 ---------------- */
        @keyframes floatSpin {
            0% { transform: rotateY(0deg) translateY(0px); }
            50% { transform: rotateY(180deg) translateY(-20px); } /* 悬浮效果 */
            100% { transform: rotateY(360deg) translateY(0px); }
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) translateZ(-20px) scale(0.8); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) translateZ(-20px) scale(1.2); opacity: 0.6; }
        }

        /* 提示文字 */
        .tips {
            position: absolute;
            bottom: 30px;
            font-size: 14px;
            opacity: 0.6;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .canvas-debug {
            position: absolute;
            top: 10px; right: 10px;
            width: 120px; opacity: 0.3;
            transform: scaleX(-1);
        }
    </style>
</head>
<body>

    <div class="scene">
        <div class="card-wrapper" id="cardWrapper">
            <div class="photo-card"></div>
        </div>
    </div>

    <div class="tips">Show your hand to unlock</div>

    <video class="input_video"></video>
    <canvas class="canvas-debug"></canvas>

    <script>
        const videoElement = document.getElementsByClassName('input_video')[0];
        const canvasElement = document.getElementsByClassName('canvas-debug')[0];
        const canvasCtx = canvasElement.getContext('2d');

        // 获取控制的DOM元素
        const cardWrapper = document.getElementById('cardWrapper');

        function onResults(results) {
            // 简单的调试画面
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 1});

                // 计算手掌开合度 (拇指指尖 vs 小指指尖)
                const thumbTip = landmarks[4];
                const pinkyTip = landmarks[20];
                const distance = Math.sqrt(
                    Math.pow(thumbTip.x - pinkyTip.x, 2) +
                    Math.pow(thumbTip.y - pinkyTip.y, 2)
                );

                // 逻辑判断
                // 当手张开 (距离 > 0.3)
                if (distance > 0.30) {
                    cardWrapper.classList.add('bloom');
                }
                // 当手合拢 (距离 < 0.2)
                else if (distance < 0.20) {
                    cardWrapper.classList.remove('bloom');
                }
            }
            canvasCtx.restore();
        }

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        camera.start();
    </script>
</body>
</html>
